<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Loja CUTS — OVER LABS</title>
<meta name="theme-color" content="#0a0a0f">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link rel="stylesheet" href="loja.css">
</head>
<body>

<div class="loja-wrap">

  <!-- ── Header ── -->
  <div class="loja-header">
    <button class="back-btn" onclick="if(window.parent!==window){window.parent.closeLojaOverlay()}else{window.location.href='../aluno.html'}">←</button>
    <div class="title">🛒 Loja CUTS</div>
    <div class="saldo-badge">
      <span class="coin">🪙</span>
      <span class="val" id="saldo-valor">0</span>
      <span class="lbl">CUTS</span>
    </div>
  </div>

  <!-- ── Conteúdo ── -->
  <div class="loja-content">

    <!-- Toggle Loja / Inventário -->
    <div class="loja-tabs" style="margin-bottom:16px">
      <button class="loja-tab active" id="btn-view-loja" onclick="showView('loja')">🛒 Loja</button>
      <button class="loja-tab" id="btn-view-inv" onclick="showView('inventario')">🎒 Inventário</button>
    </div>

    <!-- ═══ VIEW: LOJA ═══ -->
    <div id="view-loja">
      <!-- Filtro por tipo -->
      <div class="loja-tabs">
        <button class="loja-tab active" data-tab="todos" onclick="switchLojaTab('todos')">Todos</button>
        <button class="loja-tab" data-tab="avatar" onclick="switchLojaTab('avatar')">Avatares</button>
        <button class="loja-tab" data-tab="moldura" onclick="switchLojaTab('moldura')">Molduras</button>
        <button class="loja-tab" data-tab="banner" onclick="switchLojaTab('banner')">Banners</button>
        <button class="loja-tab" data-tab="emblema" onclick="switchLojaTab('emblema')">Emblemas</button>
      </div>

      <!-- Grid de itens -->
      <div class="loading" id="loja-loading"><div class="spin"></div>Carregando loja...</div>
      <div class="loja-grid" id="items-grid"></div>
    </div>

    <!-- ═══ VIEW: INVENTÁRIO ═══ -->
    <div id="view-inventario" style="display:none">
      <div id="inventory-content">
        <div class="empty"><div class="icon">🎒</div><p>Carregando inventário...</p></div>
      </div>
    </div>

  </div>
</div>

<!-- ── Modal de Compra ── -->
<div class="modal-overlay" id="buy-modal">
  <div class="modal-box">
    <img class="modal-img" id="modal-img" src="" alt="Item">
    <div class="modal-name" id="modal-name">—</div>
    <div class="modal-type" id="modal-type">—</div>
    <div class="modal-price"><span>🪙</span> <span id="modal-price-val">0</span> CUTS</div>
    <div class="modal-balance" id="modal-balance">—</div>
    <button class="btn-buy" id="btn-confirm-buy" onclick="confirmPurchase()">🪙 Confirmar Compra</button>
    <button class="btn-cancel" onclick="closeBuyModal()">Cancelar</button>
  </div>
</div>

<!-- ── Modal de Venda ── -->
<div class="modal-overlay" id="sell-modal">
  <div class="modal-box">
    <div style="font-size:13px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">💱 Confirmar Venda</div>
    <img class="modal-img" id="sell-modal-img" src="" alt="Item">
    <div class="modal-name" id="sell-modal-name">—</div>
    <div class="modal-type" id="sell-modal-type">—</div>
    <div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:14px;padding:14px;margin:14px 0">
      <div style="font-size:12px;color:#94a3b8;margin-bottom:4px">Você receberá</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:8px">
        <span style="font-size:24px">🪙</span>
        <span style="font-size:28px;font-weight:900;color:#22c55e" id="sell-modal-price">0</span>
        <span style="font-size:16px;color:#22c55e;font-weight:700">CUTS</span>
      </div>
    </div>
    <div id="sell-modal-balance" style="font-size:12px;color:#64748b;margin-bottom:16px">—</div>
    <div style="font-size:13px;color:#f87171;font-weight:700;margin-bottom:16px">⚠️ O item será removido do inventário!</div>
    <div style="display:flex;gap:10px">
      <button class="btn-cancel" onclick="closeSellModal()" style="flex:1;padding:14px;border-radius:14px;background:rgba(255,255,255,.06);color:#94a3b8;font-weight:800;font-size:14px;border:none;cursor:pointer">Não</button>
      <button id="btn-confirm-sell" onclick="confirmSell()" style="flex:1;padding:14px;border-radius:14px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-weight:900;font-size:14px;border:none;cursor:pointer">Sim, Vender!</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="loja.js"></script>
</body>
</html>
